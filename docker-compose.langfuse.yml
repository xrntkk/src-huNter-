# Langfuse self-hosted stack — dev only.
# Auto-provisions org/project/user/API keys via LANGFUSE_INIT_* env vars.
# Web UI: http://localhost:3100  (3000 left free for whatever else)
# Use `pnpm langfuse:up` / `pnpm langfuse:down` to control standalone.

name: src-agent-langfuse

services:
  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    depends_on:
      langfuse-worker:
        condition: service_started
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      SALT: dev-salt-please-change
      ENCRYPTION_KEY: "8a3b1f4d9c2e6b7a5d8f0e1c3b9a7d6e4f2c8b1a3d5e9f7c0b4a6d8e2f1c3b9a"
      NEXTAUTH_URL: http://localhost:3100
      NEXTAUTH_SECRET: dev-nextauth-secret
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: redis
      # Headless first-run provisioning (no manual signup needed)
      LANGFUSE_INIT_ORG_ID: src-agent-org
      LANGFUSE_INIT_ORG_NAME: SRC Agent
      LANGFUSE_INIT_PROJECT_ID: src-agent
      LANGFUSE_INIT_PROJECT_NAME: src-agent
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-src-agent-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-src-agent-dev
      LANGFUSE_INIT_USER_EMAIL: dev@src-agent.local
      LANGFUSE_INIT_USER_NAME: Dev
      LANGFUSE_INIT_USER_PASSWORD: dev-password

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      SALT: dev-salt-please-change
      ENCRYPTION_KEY: "8a3b1f4d9c2e6b7a5d8f0e1c3b9a7d6e4f2c8b1a3d5e9f7c0b4a6d8e2f1c3b9a"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: redis

  postgres:
    image: postgres:15
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - langfuse_postgres:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    # Pre-create the `langfuse` bucket (FS backend = a dir under /data) before
    # starting the server. Without it Langfuse's event upload fails with
    # "specified bucket does not exist" and traces never reach ClickHouse.
    entrypoint: ["/bin/sh", "-c"]
    command: ['mkdir -p /data/langfuse && minio server /data --console-address ":9001"']
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - langfuse_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: --requirepass redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  langfuse_postgres:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio:
